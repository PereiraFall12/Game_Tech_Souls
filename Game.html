    function trocarMusica(novaMusica) {
    if (musicaAtual === novaMusica) return;

        if (musicaAtual) {
            musicaAtual.pause();
            musicaAtual.currentTime = 0;
        }

        musicaAtual = novaMusica;
        musicaAtual.volume = 0.3;
        if(musicaAtual != soft_ambient_sound){
            musicaAtual.volume = 0.25;
        }
        musicaAtual.play();
    }

    function colide(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
    }

    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }

    var circle = function(x, y, radius, fillCircle) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI*2, false);
        if (fillCircle){
            ctx.fill();
        }else{
            ctx.stroke();
        }
    }

    function verify_proximity(warrior, bonfire){
        if(Math.abs(warrior.x < bonfire.x)<= 40){

    function die(warrior) {
        alert("You died"); // Feedback visual clássico

            mapa = warrior.lastBonfire.map;
            warrior.x = warrior.lastBonfire.x;
            warrior.y = warrior.lastBonfire.y;
        } else {
            // Caso não tenha tocado em nenhuma fogueira, volta ao início
            mapa = 0;
            warrior.x = 5;
            warrior.y = 370;
        }

        // Restaura a vida e stamina
        warrior.vida = warrior.vidaMax;
        warrior.stamin = warrior.staminMax;
        warrior.invencibilidade = 0;

        // Opcional: Resetar a vida de todos os inimigos do mapa ao morrer
        enemies_list.forEach(e => {
            e.vida = 2; 
        });
    }

    class Bonfire{
        constructor(x, y, sprites, map){
            this.x = x;
            this.y = y;
            this.sprites = sprites;
            this.map = map;
            this.status = 0;
            this.h = 20;
            this.w = 35;
        }

        update(tempo){
            this.status = Math.floor(tempo/15)%2;
        }

        draw(){
            ctx.drawImage(this.sprites[this.status], this.x, this.y, this.w, this.h);
        }
    }
    
    class Warrior{
        constructor(x, y, sprite){
            this.x = x;
            this.y = y;
            this.vel = 2;
            this.sprite = sprite;
            this.status = 2;
            this.w = 30;
            this.h = 30;
            this.cooldown = 0;
            this.atacando_dir = 0;
            this.atacando_esq = 0;
            this.stamin = 4;
            this.staminMax = 4; 
            this.vida = 30;
            this.vidaMax = 30;
            this.lastBonfire = null;
            this.invencibilidade = 0;
            this.attack_range = 20;
        }

        update(teclas, tempo){

            if (this.cooldown > 0) {
                this.cooldown--;
            }

            if (this.atacando_dir >0){
                this.atacando_dir--;
            }

            if (this.atacando_esq >0){
                this.atacando_esq--;
            }

            if (this.invencibilidade>0){
                this.invencibilidade--;
            }

            this.stamin = Math.min(this.staminMax, Math.max(this.stamin + 0.01, 0));

            
            if (this.atacando_dir>0) {
                this.status = 5;
            }else if(this.atacando_esq>0) {
                this.status = 6;
            }else if(teclas["w"] && teclas["d"] &&  this.cooldown == 0 && this.stamin>=1) {
                this.status = 5;
                this.cooldown = 30;
                this.atacando_dir = 10;
                this.stamin--;

                miss_attack_sound.currentTime = 0;
                miss_attack_sound.play();

            }else if(teclas["w"] && teclas["a"] && this.cooldown == 0 && this.stamin>=1) {
                this.status = 6;
                this.cooldown = 30;
                this.atacando_esq = 10;
                this.stamin--;

                miss_attack_sound.currentTime = 0;
                miss_attack_sound.play();

            }else if(teclas["d"]) {
                this.x += this.vel;
                this.status = Math.floor(tempo / 20) % 2;
            }else if(teclas["a"]) {
                this.x -= this.vel;
                this.status = 3 + Math.floor(tempo / 20) % 2;
            }else{
                this.status = 2;
            }
        }

        getHitbox() {
            if (this.status == 5){
                return {
                    x: this.x + 30, 
                    y: this.y + 5,
                    w: 20,
                    h: 5
                };
            }else{
                return {
                    x: this.x - 20, 
                    y: this.y + 5,
                    w: 20,
                    h: 5
                };
            }
        }

        draw(){
            if(this.status == 0) {
                ctx.drawImage(this.sprite[0], this.x, this.y, this.w, this.h);
            }else if(this.status == 1) {
                ctx.drawImage(this.sprite[1], this.x, this.y, this.w, this.h);
            }else if(this.status == 2) {
                ctx.drawImage(this.sprite[2], this.x, this.y, this.w, this.h);
            }else if(this.status == 3) {

                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[0], -this.x - this.w, this.y, this.w, this.h);
                ctx.restore();

            }else if(this.status == 4) {
                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[1], -this.x - this.w, this.y, this.w, this.h);
                ctx.restore();
            }else if(this.status == 5){
                ctx.drawImage(this.sprite[3], this.x, this.y, this.w + this.attack_range, this.h);
            }else if(this.status == 6){
                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[3], -this.x -this.w, this.y, this.w + this.attack_range, this.h);
                ctx.restore();
            }

            //desenha a barra de stamina
            ctx.fillStyle = "#dddddd";
            ctx.fillRect(7,30, 80, 10);
            ctx.fillStyle = "Green";
            ctx.fillRect(7, 30, this.stamin*20 , 10);
            ctx.strokeStyle = "#000000";
            ctx.strokeRect(7, 30, 80, 10);

            //desenha a barra de vida
            ctx.fillStyle = "#dddddd";
            ctx.fillRect(7,10, 5*this.vidaMax, 10);
            ctx.fillStyle = "Red";
            ctx.fillRect(7, 10, this.vida*5 , 10);
            ctx.strokeStyle = "#000000";
            ctx.strokeRect(7, 10, this.vidaMax*5 , 10);

        }
    }

    class Enemy{
        constructor(x, y, sprite, map){
            this.x = x;
            this.y = y;
            this.vel = 1;
            this.sprite = sprite;
            this.status = 2;
            this.vida = 2;
            this.w = 30;
            this.h = 40;
            this.hitBox = {x:this.x, y: this.y, w: this.w, h:this.h};
            this.invecibilidade = 0;
            this.knockback = 0;
            this.map = map;

        }

        update(tempo, warrior){

            if(this.invecibilidade>0){
                this.invecibilidade--;
            }

            if(this.knockback >0){
                this.knockback = this.knockback - 0.25;
            }

            if(this.knockback <0){
                this.knockback = this.knockback + 0.25;
            }

            if(this.vida>0){
                if (this.x - warrior.x>=0 && this.x -warrior.x <150){
                    this.x = this.x - this.vel;
                    this.status = this.status = Math.floor(tempo / 20) % 2;
                } else if (this.x - warrior.x<0 && this.x -warrior.x>-150){
                    this.x = this.x + this.vel;
                    this.status = 3 + Math.floor(tempo / 20) % 2;
                } else if (this.x - warrior.x <= -150){
                    this.status = 5;
                } else {
                    this.status = 2;
                }
                
                this.x = this.x + this.knockback;
                this.hitBox.x = this.x;
                this.hitBox.y = this.y;
            }else{
                this.status = 6;
            }

        }

        draw(){
            
            if(this.status == 0) {
                ctx.drawImage(this.sprite[0], this.x, this.y, this.w, this.h);
            }else if(this.status == 1) {
                ctx.drawImage(this.sprite[1], this.x, this.y, this.w, this.h);
            }else if(this.status == 2) {
                ctx.drawImage(this.sprite[2], this.x, this.y, this.w, this.h);
            }else if(this.status == 3) {

                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[0], -this.x - this.w, this.y, this.w, this.h);
                ctx.restore();

            }else if(this.status == 4) {

                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[1], -this.x - this.w, this.y, this.w, this.h);
                ctx.restore();

            }else if(this.status == 5){
                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[2], -this.x - this.w, this.y, this.w, this.h);
                ctx.restore();
            }else if (this.status == 6){
                ctx.drawImage(this.sprite[3], this.x - 5, this.y + 12, 42, 28);
            }
            
        }
    }

    class Ogre_Enemy{
        constructor(x, y, sprite, map){
            this.x = x;
            this.y = y;
            this.vel = 1;
            this.sprite = sprite;
            this.status = 2;
            this.vida = 2;
            this.w = 30;
            this.h = 40;
            this.hitBox = {x:this.x, y: this.y, w: this.w, h:this.h};
            this.invecibilidade = 0;
            this.knockback = 0;
            this.atacando = 0;
            this.atacando_2 = 0;
            this.map = map;
            this.attack_range = 30;

        }

        update(tempo, warrior){

            if(this.invecibilidade>0){
                this.invecibilidade--;
            }

            if(this.knockback >0){
                this.knockback = this.knockback - 0.25;
            }

            if(this.knockback <0){
                this.knockback = this.knockback + 0.25;
            }

            if(this.atacando > 0){
                this.atacando--;
            }

            if(this.atacando_2 >0){
                this.atacando_2--;
            }

            if(this.vida>0){

                if ((this.x - warrior.x>=0  && this.x - warrior.x < 30 && this.atacando == 0 && this.status!=6 && this.status!=8 && this.status!=7 && this.status!=9 )){ // começa a animação
                    this.atacando = 30;
                    this.status = 6; //carregando ataque para esquerda
                }else if (this.atacando>0 && this.status == 6){ //durante a animação
                    this.status = 6; //carregando ataque para esquerda
                }else if((this.atacando == 0 && this.status == 6)){ //começa a animação 
                    this.atacando_2 = 30;
                    this.status = 7; //ataque para esquerda
                }else if(this.atacando_2>0 && this.status == 7){ // durante a animação
                    this.status = 7; //ataque para esquerda
                }else if ((this.x - warrior.x<=0  && this.x - warrior.x > -30 && this.atacando == 0 && this.status!=6 && this.status!=8 && this.status!=7 && this.status!=9)){ // começa a animação
                    this.atacando = 30;
                    this.status = 8; //carregando ataque para direita
                }else if ( (this.atacando>0 && this.status == 8)){ // durante a animação
                    this.status = 8; //carregando ataque para direita
                }else if((this.atacando == 0 && this.status == 8)){ // começa a animação
                    this.atacando_2 = 30;
                    this.status = 9; //ataque para direita
                }else if(this.atacando_2>0 && this.status == 9){ // durante a animação
                    this.status = 9; //ataque para direita
                }else if (this.x - warrior.x>=0 && this.x -warrior.x <150){
                    this.x = this.x - this.vel;
                    this.status = this.status = Math.floor(tempo / 20) % 3;
                } else if (this.x - warrior.x<0 && this.x -warrior.x>-150){
                    this.x = this.x + this.vel;
                    this.status = 3 + Math.floor(tempo / 20) % 3;
                } else if (this.x - warrior.x <= -150){
                    this.status = 5;
                } else {
                    this.status = 2;
                }
                
                this.x = this.x + this.knockback;
                this.hitBox.x = this.x;
                this.hitBox.y = this.y;
            }else{
                this.status = 10; //morto
            }

        }

        draw(){
            
            if(this.status == 0) {
                ctx.drawImage(this.sprite[0], this.x, this.y, this.w, 40);
            }else if(this.status == 1) {
                ctx.drawImage(this.sprite[1], this.x, this.y, this.w, 40);
            }else if(this.status == 2) {
                ctx.drawImage(this.sprite[2], this.x, this.y, this.w, 40);
            }else if(this.status == 3) {

                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[0], -this.x - this.w, this.y, this.w, 40);
                ctx.restore();

            }else if(this.status == 4) {

                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[1], -this.x - this.w, this.y, this.w, 40);
                ctx.restore();

            }else if(this.status == 5){
                ctx.save();
                ctx.scale(-1, 1); 
                ctx.drawImage(this.sprite[2], -this.x - this.w, this.y, this.w, this.h);
                ctx.restore();

            }else if (this.status == 6){
                ctx.drawImage(this.sprite[3], this.x, this.y, this.w, this.h);

            }else if (this.status == 7){
                ctx.drawImage(this.sprite[4], this.x-this.w, this.y, this.attack_range + this.w, this.h);
                
            }else if (this.status == 8){

                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(this.sprite[3], -this.x-this.w, this.y, this.w, this.h);
                ctx.restore();

            }else if (this.status == 9){

                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(this.sprite[4], -this.x-this.attack_range - this.w, this.y, this.attack_range + this.w, this.h);
                ctx.restore();
                
            }else if (this.status == 10){
                ctx.drawImage(this.sprite[5], this.x - 5, this.y, this.attack_range + this.w, this.h);
            }
            
        }
    }

    
    var drawSun = function(x, y, status){

        if(status == 1) {
            ctx.drawImage(sun_0, x, y, 100, 100);
        }else{
            ctx.drawImage(sun_1, x, y, 100, 100)
        }
    }

    var drawTorch = function(x, y, status){

        if(status == 1) {
            ctx.drawImage(torch_0, x, y, 30, 30);
        }else{
            ctx.drawImage(torch_1, x, y, 30, 30)
        }
    }

    var drawEye = function(x, y, warrior){

        ctx.fillStyle = "White";
        circle(x, y, 50, true);
        let theta = Math.atan((x - warrior.x)/ (y - warrior.y));
        ctx.fillStyle = "Red";
        circle(x + 23*Math.sin(theta), y + 23*Math.cos(theta),25, true);
        ctx.fillStyle = "black";
        circle(x + 23*Math.sin(theta), y + 23*Math.cos(theta),15, true);
        ctx.fillStyle = "#dddddd";
        circle(x + 5 + 23*Math.sin(theta), y - 5 + 23*Math.cos(theta), 4, true);
        
    }

            drawEye(300, 100, warrior_jhon);

        }

        for(var i = 0; i<bonfires.length; i++){
            if(bonfires[i].map == mapa){
                bonfires[i].update(tempo);
                bonfires[i].draw();
                if(teclas["c"]){
                    verify_proximity(warrior_jhon, bonfires[i]);
                }
            }
        }

        //Ataque do jogador
        if (warrior_jhon.status == 5 || warrior_jhon.status == 6) {
            let hit = warrior_jhon.getHitbox();

            for(var i = 0; i<enemies_list.length; i++){
                if(colide(hit, enemies_list[i].hitBox) && enemies_list[i].invecibilidade == 0 && enemies_list[i].map == mapa){
                    enemies_list[i].vida--;
                    enemies_list[i].invecibilidade = 40;
                    if(enemies_list[i].x - warrior_jhon.x >= 0){
                        enemies_list[i].knockback = 4;
                    }else{
                        enemies_list[i].knockback = -4;
                    }
                    defended_attack_sound.currentTime = 0.19;
                    defended_attack_sound.play();
                }
            }
            warrior_jhon.status = 2; 
        }

        //atualização do bot
        for(var i = 0; i<enemies_list.length; i++){
            if(enemies_list[i].map == mapa){
                enemies_list[i].update(tempo, warrior_jhon);
                enemies_list[i].draw();
            }
        }

        //Ataque do inimigo
        for(var i = 0; i<enemies_list.length; i++){
            if (enemies_list[i].map == mapa && enemies_list[i].vida > 0) {
            
            // Inimigo ataca Warrior (Novo)
            let bodyInimigo = { x: enemies_list[i].x, y: enemies_list[i].y, w: enemies_list[i].w, h: enemies_list[i].h };
            let bodyWarrior = { x: warrior_jhon.x, y: warrior_jhon.y, w: warrior_jhon.w, h: warrior_jhon.h };

            if (colide(bodyInimigo, bodyWarrior) && warrior_jhon.invencibilidade == 0 && (enemies_list[i].status == 7 ||enemies_list[i].status == 9)) {
                warrior_jhon.vida -= 10; 
                warrior_jhon.invencibilidade = 30; // Tempo de segurança

                attack_sound.currentTime = 0;
                attack_sound.play();
                
                }
            }
        }

        warrior_jhon.update(teclas, tempo);
        warrior_jhon.draw();

        if (warrior_jhon.vida <= 0) {
            die(warrior_jhon);
        }

        if (emCombate()) {
            trocarMusica(combat_sound);
        } else {
            trocarMusica(soft_ambient_sound);
        }

        if(warrior_jhon.x >570){


            let pass_edge = true;

            for(var i = 0; i<enemies_list.length; i++){
                if(enemies_list[i].vida>0 && enemies_list[i].map == mapa){
                    pass_edge = false;
                }
            }

            if (pass_edge == false || mapa == num_cenarios -1){
                warrior_jhon.x =570;
            }else{
                warrior_jhon.x = 5;
                mapa++;
            }
            
        }

        if (warrior_jhon.x < 0){

            let pass_edge = true;

            for(var i = 0; i<enemies_list.length; i++){
                if(enemies_list[i].vida>0 && enemies_list[i].map == mapa){
                    pass_edge = false;
                }
            }
            
            if (pass_edge == false || mapa == 0){
                warrior_jhon.x = 0;
            }else{
                warrior_jhon.x = 570;
                mapa--;
            }
        }

    }, 16); 

</script>
